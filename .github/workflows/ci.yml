name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.28"
          python-version-file: .python-version
          enable-cache: true
      - name: Sync locked environment
        run: uv sync --locked --all-groups
      - name: Format
        run: uv run --locked ruff format --check .
      - name: Lint
        run: uv run --locked ruff check .
      - name: Typecheck
        run: uv run --locked mypy --strict src tests scripts
      - name: Test
        run: uv run --locked pytest
      - name: Architecture
        run: PYTHONPATH=src uv run --locked lint-imports
      - name: Static security
        run: uv run --locked bandit -q -r src scripts
      - name: Dependency audit
        run: |
          uv export --locked --no-dev --no-emit-project --format requirements.txt --output-file /tmp/requirements.txt
          uv run --locked pip-audit --disable-pip --require-hashes --requirement /tmp/requirements.txt
      - name: Install pinned gitleaks
        run: |
          curl --fail --location --silent --show-error \
            https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz \
            --output /tmp/gitleaks.tar.gz
          echo "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb  /tmp/gitleaks.tar.gz" | sha256sum --check --strict
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
      - name: Secret scan
        run: /tmp/gitleaks git --redact --no-banner
